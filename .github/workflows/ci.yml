name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -S . -B build ${{ matrix.os == 'windows-latest' && '-A x64' || '' }}

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build -C Debug --output-on-failure

    - name: Install
      run: cmake --install build --prefix "${{ runner.temp }}/corebrick-install"

    - name: Install Test (cmake_install_test)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cmake -S tests/cmake_install_test -B build_install_test \
          -DCMAKE_PREFIX_PATH="${{ runner.temp }}/corebrick-install"
        cmake --build build_install_test
        ./build_install_test/test_install

    - name: Install Test Script (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        ./scripts/install_test.ps1 -InstallPrefix "${{ runner.temp }}/corebrick-install"

    - name: Install Test Script (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        chmod +x ./scripts/install_test.sh
        ./scripts/install_test.sh "${{ runner.temp }}/corebrick-install"

    - name: Windows Scripts
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        ./scripts/check_version.ps1
        ./scripts/check_no_artifacts.ps1
        ./scripts/smoke_test.ps1
